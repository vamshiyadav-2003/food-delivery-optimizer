<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Food Delivery Optimizer</title>

    <link rel="stylesheet" href="login.css">
     <link rel="stylesheet" href="animation.css">


    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

    <!-- Back to Home Button -->
    <div style="position: absolute; top: 20px; left: 20px; z-index: 10;">
        <a href="index.html" style="background: rgba(255,255,255,0.25); color: white; padding: 10px 20px; border-radius: 20px; text-decoration: none; font-weight: bold; font-family: Poppins, sans-serif; box-shadow: 0 4px 6px rgba(0,0,0,0.1); backdrop-filter: blur(5px); display: inline-flex; align-items: center; gap: 8px;"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
    </div>

<div class="container">

    <div class="left">

        <img src="https://res.cloudinary.com/dp2cvy0zy/image/upload/v1782800987/Black_White_Minimalist_Business_Logo_rhaakb-removebg-preview_negnb9.png" class="logo">

        <h1>Welcome Back!</h1>

        <p>Login to manage deliveries, routes and orders.</p>

    </div>

    <div class="right">

        <div class="login-box">

            <h2>Login</h2>

            <form id="loginForm">

                <div class="input-box">

                    <i class="fa-solid fa-envelope"></i>

                    <input id="email" type="email" placeholder="Email Address" required>

                </div>

                <div class="input-box">

                    <i class="fa-solid fa-lock"></i>

                    <input id="password" type="password" placeholder="Password" required>

                    <i class="fa-solid fa-eye" id="togglePassword"></i>

                </div>

                <div class="options">

                    <label>

                        <input type="checkbox">

                        Remember Me

                    </label>

                    <a href="#">Forgot Password?</a>

                </div>

                <button type="submit">

                    Login

                </button>

                <p class="register">

                    Don't have an account?

                    <a href="register.html">

                        Register

                    </a>

                </p>

                <p class="register" style="margin-top: 15px;">

                    Are you an Administrator?

                    <a href="admin_login.html" style="color: #ff5722; font-weight: bold;">

                        Admin Login

                    </a>

                </p>

            </form>

        </div>

    </div>

</div>

<script src="login.js"></script>


</body>
</html>
