<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Live Delivery Tracking</title>

<link rel="stylesheet" href="location.css">
<script src="location.js"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css">

</head>

<body>

<div class="container">

<h1>📍 Live Delivery Tracking</h1>

<p>Monitor delivery agents and customer locations in real time.</p>

<div class="tracking">

<div class="map">

<img src="https://images.unsplash.com/photo-1524661135-423995f22d0b?w=1200"
alt="Map">

<div class="marker restaurant">
🍔
</div>

<div class="marker agent">
🛵
</div>

<div class="marker customer">
🏠
</div>

</div>

<div class="info">

<h2>Delivery Details</h2>

<div class="card">

<h3>Restaurant</h3>

<p>Pizza Hub</p>

</div>

<div class="card">

<h3>Delivery Agent</h3>

<p>Rahul Kumar</p>

</div>

<div class="card">

<h3>Customer</h3>

<p>Vamshi Krishna</p>

</div>

<div class="card">

<h3>Distance</h3>

<p>12.4 km</p>

</div>

<div class="card">

<h3>Estimated Time</h3>

<p>22 Minutes</p>

</div>

<div class="card">

<h3>Status</h3>

<p id="status">On The Way</p>

</div>

<button id="trackBtn">

Track Delivery

</button>

</div>

</div>

<script src="js/location.js"></script>

</body>

</html>
